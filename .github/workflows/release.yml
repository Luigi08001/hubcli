name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # Matches ci.yml — see that file for the rationale (cross-OS WASM
        # transitive resolution differences between macOS and Linux).
        run: npm install --no-audit --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate checksums
        run: npm run release:checksums && shasum -a 256 -c release/checksums.sha256

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -czf "hscli-${VERSION}.tar.gz" dist/ package.json README.md LICENSE
          shasum -a 256 "hscli-${VERSION}.tar.gz" >> release/checksums.sha256

      - name: Generate artifact attestation
        # Build provenance attestation is only available on public repos
        # (or private repos on paid GitHub plans). Made non-blocking so the
        # Release workflow completes on private repos; when the repo goes
        # public, attestations will be generated automatically.
        uses: actions/attest-build-provenance@v2
        continue-on-error: true
        with:
          subject-path: "hscli-*.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            hscli-*.tar.gz
            release/checksums.sha256
